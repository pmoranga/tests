name: Build and Push keel-telegram-bot Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Image name (without registry), e.g. keel-telegram-bot"
        required: true
        default: "keel-telegram-bot"
      image_tag:
        description: "Tag to publish (e.g. arm64, latest, v1.2.3)"
        required: true
        default: "arm64"
      platforms:
        description: "Comma-separated docker platforms"
        required: true
        default: "linux/arm64"
      push_latest:
        description: "Also push :latest"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: prep
        shell: bash
        run: |
          IMAGE="${REGISTRY}/${OWNER}/${{ inputs.image_name }}"
          TAGS="${IMAGE}:${{ inputs.image_tag }}"
          if [[ "${{ inputs.push_latest }}" == "true" ]]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

          TAGS_BULLET="$(echo "$TAGS" | tr ',' '\n' | sed 's/^/- /')"
          {
            echo "### 🚀 Container Build Requested"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Repository | \`${{ github.repository }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Actor | \`${{ github.actor }}\` |"
            echo "| Image Base | \`${IMAGE}\` |"
            echo "| Platforms | \`${{ inputs.platforms }}\` |"
            echo "| Push latest | \`${{ inputs.push_latest }}\` |"
            echo ""
            echo "#### Tags to push"
            echo "$TAGS_BULLET"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          TAGS_BULLET="$(echo "${{ steps.prep.outputs.tags }}" | tr ',' '\n' | sed 's/^/- /')"
          {
            echo ""
            echo "### ✅ Build Result"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Outcome | \`${{ job.status }}\` |"
            echo "| Digest | \`${{ steps.build.outputs.digest }}\` |"
            echo "| Run URL | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
            echo ""
            echo "#### Published tags"
            echo "$TAGS_BULLET"
          } >> "$GITHUB_STEP_SUMMARY"
