name: Build and Push keel-telegram-bot Image

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source repo (owner/name)"
        required: true
        default: "markusressel/keel-telegram-bot"
      source_ref:
        description: "Branch/tag/commit to build"
        required: true
        default: "master"
      image_name:
        description: "Image name under ghcr.io/<owner>/"
        required: true
        default: "keel-telegram-bot"
      image_tag:
        description: "Tag to publish"
        required: true
        default: "arm64"
      platforms:
        description: "Comma-separated docker platforms"
        required: true
        default: "linux/arm64"
      push_latest:
        description: "Also push :latest"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this workflow repo
        uses: actions/checkout@v4

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          path: source

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: prep
        shell: bash
        run: |
          IMAGE="${REGISTRY}/${OWNER}/${{ inputs.image_name }}"
          TAGS="${IMAGE}:${{ inputs.image_tag }}"
          if [[ "${{ inputs.push_latest }}" == "true" ]]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

          TAGS_BULLET="$(echo "$TAGS" | tr ',' '\n' | sed 's/^/- /')"
          {
            echo "### 🚀 Build Requested"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Source repo | \`${{ inputs.source_repo }}\` |"
            echo "| Source ref | \`${{ inputs.source_ref }}\` |"
            echo "| Image base | \`${IMAGE}\` |"
            echo "| Platforms | \`${{ inputs.platforms }}\` |"
            echo ""
            echo "#### Tags to push"
            echo "$TAGS_BULLET"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./source
          file: ./source/Dockerfile
          push: true
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          TAGS_BULLET="$(echo "${{ steps.prep.outputs.tags }}" | tr ',' '\n' | sed 's/^/- /')"
          {
            echo ""
            echo "### ✅ Build Result"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Outcome | \`${{ job.status }}\` |"
            echo "| Digest | \`${{ steps.build.outputs.digest }}\` |"
            echo ""
            echo "#### Published tags"
            echo "$TAGS_BULLET"
          } >> "$GITHUB_STEP_SUMMARY"
